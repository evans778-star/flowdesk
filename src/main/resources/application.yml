# Flowdesk common configuration.
# Use application-dev.yml for local development and application-prod.yml for production.

spring:
  application:
    name: ${FLOWDESK_APP_NAME:Flowdesk}

  profiles:
    default: dev

  servlet:
    multipart:
      enabled: true
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:50MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:50MB}

  ai:
    dashscope:
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-max}
          temperature: ${DASHSCOPE_CHAT_TEMPERATURE:0.7}
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}

server:
  port: ${SERVER_PORT:8888}
  servlet:
    context-path: /

websocket:
  server:
    port: ${WEBSOCKET_PORT:9000}
    path: ${WEBSOCKET_PATH:/ws}

jwt:
  expire: ${JWT_EXPIRE_SECONDS:8640000}

dashscope:
  base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  chat:
    model: ${DASHSCOPE_CHAT_MODEL:qwen-max}
    temperature: ${DASHSCOPE_CHAT_TEMPERATURE:0.7}
  embedding:
    model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}

ai:
  memory:
    max-token-limit: ${AI_MEMORY_MAX_TOKEN_LIMIT:2000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

flowdesk:
  ai:
    enabled: ${FLOWDESK_AI_ENABLED:false}
    provider: ${FLOWDESK_AI_PROVIDER:ollama}
    embedding-dimension: ${FLOWDESK_AI_EMBEDDING_DIMENSION:0}
    vector-index-name: ${FLOWDESK_AI_VECTOR_INDEX_NAME:}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat-model: ${OLLAMA_CHAT_MODEL:qwen2.5:7b}
      embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
      timeout: ${OLLAMA_TIMEOUT:30s}
  user:
    default-password: ${FLOWDESK_USER_DEFAULT_PASSWORD:}
  mcp:
    enabled: ${FLOWDESK_MCP_ENABLED:false}
    write-tools-enabled: ${FLOWDESK_MCP_WRITE_TOOLS_ENABLED:false}

upload:
  save-path: ${UPLOAD_SAVE_PATH:upload/}
  host: ${UPLOAD_HOST:http://127.0.0.1:8888}
  max-file-size-bytes: ${UPLOAD_MAX_FILE_SIZE_BYTES:52428800}
  allowed-extensions: ${UPLOAD_ALLOWED_EXTENSIONS:.pdf,.txt,.md,.csv,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.png,.jpg,.jpeg,.gif,.webp}
  allowed-content-types: ${UPLOAD_ALLOWED_CONTENT_TYPES:application/pdf,text/plain,text/markdown,text/csv,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation,image/png,image/jpeg,image/gif,image/webp}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.aiwork.helper: ${LOG_LEVEL_APP:INFO}
    org.springframework.data.mongodb: ${LOG_LEVEL_MONGODB:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level requestId=%X{requestId:-} %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level requestId=%X{requestId:-} %logger{50} - %msg%n'
  file:
    name: ${LOG_FILE:logs/Flowdesk.log}
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
